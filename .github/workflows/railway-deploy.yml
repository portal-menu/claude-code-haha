name: Railway Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: vectormaker/railway-deploy-action@v1.0.0
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
